<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Replay</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <span id="toolbar-symbol" class="toolbar-label">BTC/USDT</span>
      <select id="toolbar-timeframe" class="toolbar-select">
        <option value="5m">5m</option>
        <option value="30m">30m</option>
        <option value="1h">1h</option>
        <option value="4h" selected>4h</option>
        <option value="1D">1D</option>
      </select>
      <input type="date" id="toolbar-date-start" class="toolbar-input" />
      <span class="toolbar-sep">&rarr;</span>
      <input type="date" id="toolbar-date-end" class="toolbar-input" />
      <button id="btn-load" class="btn-primary">Load</button>
      <label class="indicator-toggle" for="toggle-ma20">
        <input type="checkbox" id="toggle-ma20">
        <span class="indicator-toggle-swatch indicator-toggle-swatch--ma"></span>
        MA20
      </label>
      <label class="indicator-toggle" for="toggle-ema20">
        <input type="checkbox" id="toggle-ema20">
        <span class="indicator-toggle-swatch indicator-toggle-swatch--ema"></span>
        EMA20
      </label>
      <label class="indicator-toggle" for="toggle-volume">
        <input type="checkbox" id="toggle-volume">
        <span class="indicator-toggle-swatch indicator-toggle-swatch--volume"></span>
        Vol
      </label>
      <div class="toolbar-separator"></div>
      <button id="btn-draw-entry" class="draw-btn" data-type="entry"
              title="Đặt Entry line (click để activate, click lại để cancel)">Entry</button>
      <button id="btn-draw-tp" class="draw-btn" data-type="tp"
              title="Đặt Take Profit line">TP</button>
      <button id="btn-draw-sl" class="draw-btn" data-type="sl"
              title="Đặt Stop Loss line">SL</button>
      <div class="toolbar-separator"></div>
      <button id="btn-replay-play" class="replay-btn" title="Play/Pause replay (Space)">▶</button>
      <button id="btn-replay-reset" class="replay-btn" title="Reset replay" disabled>⏮</button>
      <div class="toolbar-separator"></div>
      <button id="btn-speed-slow" class="speed-btn" data-speed="500" title="Slow (500ms/bar)">1</button>
      <button id="btn-speed-normal" class="speed-btn speed-btn--active" data-speed="150" title="Normal (150ms/bar)">2</button>
      <button id="btn-speed-fast" class="speed-btn" data-speed="30" title="Fast (30ms/bar)">3</button>
      <div class="toolbar-separator"></div>
      <div id="preflight-checklist" class="preflight-checklist"></div>
    </div>
    <div id="session-fingerprint" class="session-fingerprint" style="display:none;"></div>

    <!-- Main content -->
    <div id="app-content">
      <!-- Chart -->
      <div id="chart-container"></div>

      <!-- Results panel -->
      <div id="results-panel">
        <div id="results-table-header" class="results-table-header">
          <span>#</span><span>Type</span><span>Entry</span><span>Exit</span><span>Result</span><span>P&L</span><span>Time</span>
        </div>
        <div id="results-table-body" class="results-table-body"></div>
        <div id="results-empty-msg" class="results-empty-msg" style="display:none;"></div>
        <div id="results-summary" class="results-summary"></div>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-mode">SETUP MODE</span>
      <span id="status-data-info"></span>
    </div>
  </div>

  <!-- Phase 2 overlay containers (mount via JS) -->
  <div id="session-list-root"></div>
  <div id="export-preview-root"></div>
  <div id="toast-root"></div>

  <!-- Cheat sheet overlay -->
  <div id="cheat-sheet-overlay" class="cheat-sheet-overlay" style="display:none;">
    <div class="cheat-sheet-panel">
      <h3>Keyboard Shortcuts</h3>
      <div class="cheat-sheet-grid">
        <span class="cheat-sheet-key">Space</span><span>Play / Pause</span>
        <span class="cheat-sheet-key">1 2 3</span><span>Slow · Normal · Fast</span>
        <span class="cheat-sheet-key">← →</span><span>Step back / forward (paused)</span>
        <span class="cheat-sheet-key">R</span><span>Reset</span>
        <span class="cheat-sheet-key">E T S</span><span>Draw Entry / TP / SL</span>
        <span class="cheat-sheet-key">Del</span><span>Delete selected line</span>
        <span class="cheat-sheet-key">Esc</span><span>Cancel drawing mode</span>
        <span class="cheat-sheet-key">?</span><span>This cheat sheet</span>
      </div>
    </div>
  </div>

  <script>window.__SUPABASE_ENABLED__ = {{ supabase_enabled }};</script>
  <script src="/static/app.js"></script>
</body>
</html>
